<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SPH 행운의 돌림판</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --main:#37B782;
  --main-light:#4de8a5;
  --main-dark:#2a8f65;
  --sub:#0F848F;
  --sub-light:#18b5c4;
  --bg:#0c1a14;
  --surface:#132b22;
  --gold:#E8D06F;
  --text:#f3fbf7;
  --text-dim:rgba(234,245,240,.62);
  --text-faint:rgba(234,245,240,.42);
}

html,body{width:100%;height:100%;overflow:hidden;
  font-family:'Noto Sans KR','Outfit',sans-serif;
  background:var(--bg);
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
  -webkit-user-select:none;user-select:none;
}

body{
  display:flex;flex-direction:column;
  min-height:100%;min-height:100dvh;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  position:relative;overflow:hidden;
}

/* ═══ BG ═══ */
.bg{position:fixed;inset:0;pointer-events:none;z-index:0}
.bg::before{
  content:'';position:absolute;
  width:160vmax;height:160vmax;top:50%;left:50%;transform:translate(-50%,-50%);
  background:
    radial-gradient(ellipse at 20% 20%,rgba(55,183,130,.18) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 80%,rgba(15,132,143,.14) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 50%,rgba(55,183,130,.05) 0%,transparent 45%);
}
.bg::after{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(55,183,130,.035) 1px,transparent 1px),
    linear-gradient(90deg,rgba(55,183,130,.035) 1px,transparent 1px);
  background-size:80px 80px;
}
canvas.stars{position:fixed;inset:0;pointer-events:none;z-index:0}

/* ═══ HEADER ═══ */
.header{
  position:relative;z-index:5;
  display:flex;align-items:center;justify-content:center;
  padding:clamp(14px,2.5vh,26px) clamp(18px,4vw,36px) 0;
  width:100%;
}
.logo-bar{
  display:flex;align-items:center;
  gap:clamp(20px,3.2vw,34px);
  padding:clamp(6px,1vh,12px) clamp(14px,2.5vw,24px);
  margin-left:clamp(20px,4vw,50px);
}
.logo-bar img{display:block;object-fit:contain}
.logo-main{height:clamp(32px,5vh,50px)}
.logo-partners{display:flex;align-items:center;gap:clamp(18px,3vw,30px)}
.logo-partners img{height:clamp(24px,3.6vh,36px)}
#logoSigma{height:clamp(72px,12vh,110px)}

/* ═══ MAIN ═══ */
.main{
  flex:1;display:flex;align-items:center;justify-content:center;
  position:relative;z-index:2;
  gap:clamp(20px,5vw,56px);
  padding:0 clamp(18px,4vw,44px);
  margin-top:clamp(-50px,-6vh,-20px);
}

/* ═══ LEFT ═══ */
.side-l{flex:0 0 auto;max-width:280px;text-align:right}
.side-l .kicker{
  display:inline-block;font-family:'Outfit',sans-serif;font-weight:600;
  font-size:clamp(.62rem,1.25vw,.78rem);letter-spacing:4px;
  color:var(--main-light);text-transform:uppercase;
  padding:6px 12px;margin-bottom:14px;
  border:1px solid rgba(55,183,130,.35);border-radius:999px;
  background:rgba(55,183,130,.08);
}
.side-l h1{
  font-family:'Noto Sans KR','Outfit',sans-serif;font-weight:900;
  font-size:clamp(2rem,5vw,3.8rem);line-height:1;
  color:var(--text);margin-bottom:18px;
  text-shadow:0 2px 30px rgba(55,183,130,.25);
}
.side-l h1 em{
  font-style:normal;display:block;font-size:1.15em;
  background:linear-gradient(135deg,#a8ffd8 0%,var(--main-light) 35%,var(--main) 65%,var(--sub-light) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 2px 16px rgba(55,183,130,.35));
}
.side-l p{
  font-weight:400;font-size:clamp(.75rem,1.6vw,.95rem);
  color:var(--text-dim);line-height:1.7;letter-spacing:.2px;
}
.side-l .line{
  width:64px;height:3px;margin-left:auto;margin-bottom:18px;
  background:linear-gradient(90deg,transparent,var(--main) 40%,var(--sub-light));
  border-radius:2px;
  box-shadow:0 0 16px rgba(55,183,130,.5);
}

/* ═══ WHEEL ═══ */
.wheel-area{
  --size:min(64vw,60vh,460px);
  position:relative;width:var(--size);height:var(--size);flex-shrink:0;
}
.ring-deco{position:absolute;inset:-18px;border-radius:50%;border:1px solid rgba(55,183,130,.1)}
.ring-deco::before{content:'';position:absolute;inset:-10px;border-radius:50%;border:1px solid rgba(55,183,130,.05)}

.wheel-glow{
  position:absolute;inset:-24px;border-radius:50%;
  background:conic-gradient(from 0deg,
    rgba(55,183,130,.14),rgba(15,132,143,.12),rgba(55,183,130,.18),
    rgba(15,132,143,.10),rgba(55,183,130,.14));
  animation:glR 10s linear infinite;filter:blur(24px);opacity:.6;
}
@keyframes glR{to{transform:rotate(360deg)}}

canvas.leds{position:absolute;inset:-10px;z-index:1}
#wheel{position:absolute;inset:0;width:100%;height:100%;border-radius:50%;z-index:2;
  filter:drop-shadow(0 4px 36px rgba(0,0,0,.55))}

.ptr{position:absolute;top:-16px;left:50%;z-index:12;transform:translateX(-50%)}
.ptr svg{filter:drop-shadow(0 2px 8px rgba(0,0,0,.5))}
.ptr.tick{animation:pT .1s ease}
@keyframes pT{0%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(5px)}100%{transform:translateX(-50%) translateY(0)}}

.cbtn{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:12;
  --s:clamp(56px,13vw,84px);width:var(--s);height:var(--s);
  border-radius:50%;border:none;cursor:pointer;
  background:radial-gradient(circle at 38% 32%,#a8ffd8,var(--main) 60%,var(--main-dark));
  box-shadow:0 0 0 3px var(--main-dark),0 2px 24px rgba(55,183,130,.4),inset 0 1px 4px rgba(255,255,255,.35);
  font-family:'Outfit',sans-serif;font-weight:900;
  font-size:clamp(.7rem,2.6vw,1.15rem);color:#062e1c;letter-spacing:2px;
  display:grid;place-items:center;transition:transform .12s,box-shadow .12s;
}
.cbtn:active{transform:translate(-50%,-50%) scale(.90)}
.cbtn.off{opacity:.35;pointer-events:none}
.cbtn .rng{position:absolute;inset:-8px;border-radius:50%;border:1.5px solid var(--main);opacity:0;animation:pR 2.5s ease-out infinite}
@keyframes pR{0%{transform:scale(1);opacity:.5}100%{transform:scale(1.45);opacity:0}}

/* ═══ RIGHT ═══ */
.side-r{flex:0 0 auto;max-width:240px}
.side-r .kicker{
  display:inline-block;font-family:'Outfit',sans-serif;font-weight:600;
  font-size:clamp(.62rem,1.25vw,.78rem);letter-spacing:4px;
  color:var(--sub-light);text-transform:uppercase;
  padding:6px 12px;margin-bottom:14px;
  border:1px solid rgba(24,181,196,.35);border-radius:999px;
  background:rgba(15,132,143,.08);
}
.side-r .tip{
  font-size:clamp(.78rem,1.55vw,.96rem);color:var(--text);
  line-height:1.85;letter-spacing:.2px;font-weight:400;
}
.side-r .tip strong{
  color:var(--main-light);font-weight:700;
  background:linear-gradient(135deg,var(--main-light),var(--sub-light));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.side-r .tip .small{display:block;margin-top:10px;color:var(--text-faint);font-size:.82em;line-height:1.6}
.side-r .line{
  width:64px;height:3px;margin-bottom:18px;
  background:linear-gradient(90deg,var(--sub-light) 0%,var(--main) 60%,transparent);
  border-radius:2px;
  box-shadow:0 0 16px rgba(15,132,143,.45);
}

/* ═══ FOOTER ═══ */
.footer{position:relative;z-index:5;
  text-align:center;
  padding:0 20px clamp(10px,2vh,20px);width:100%;
  padding-left:clamp(20px,4vw,50px);
}
.footer p{font-family:'Outfit',sans-serif;font-size:clamp(.52rem,1.1vw,.68rem);color:var(--text-faint);letter-spacing:3px;font-weight:500}

/* ═══ MODAL ═══ */
.overlay{
  position:fixed;inset:0;background:rgba(5,13,10,.82);z-index:100;
  display:grid;place-items:center;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.overlay.on{opacity:1;pointer-events:auto}
.modal{
  background:linear-gradient(160deg,#0c1f18,#0a1a2a);
  border:1.5px solid var(--main);border-radius:28px;
  padding:clamp(28px,6vw,44px) clamp(24px,5vw,40px);
  text-align:center;width:min(400px,86vw);
  box-shadow:0 0 100px rgba(55,183,130,.1),0 0 200px rgba(15,132,143,.06);
  transform:scale(.5) translateY(20px);
  transition:transform .4s cubic-bezier(.175,.885,.32,1.275);
}
.overlay.on .modal{transform:scale(1) translateY(0)}
.m-icon{font-size:clamp(3rem,10vw,5rem);margin-bottom:12px}
.m-title{
  font-family:'Outfit',sans-serif;font-weight:900;
  font-size:clamp(1.3rem,4.5vw,2.1rem);
  background:linear-gradient(90deg,var(--main-light),var(--main));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;
}
.m-prize{font-size:clamp(1rem,3.5vw,1.5rem);color:#fff;font-weight:700;margin-bottom:24px}
.m-btn{
  background:linear-gradient(135deg,var(--main-light),var(--main-dark));
  border:none;border-radius:16px;padding:13px 48px;
  font-family:'Outfit',sans-serif;font-weight:700;
  font-size:clamp(.85rem,2.5vw,1.05rem);color:#062e1c;cursor:pointer;letter-spacing:1px;
  box-shadow:0 4px 24px rgba(55,183,130,.25);transition:transform .1s;
}
.m-btn:active{transform:scale(.95)}

canvas#confetti{position:fixed;inset:0;pointer-events:none;z-index:99}

.ld{position:fixed;inset:0;background:var(--bg);z-index:200;display:grid;place-items:center;transition:opacity .5s}
.ld.hide{opacity:0;pointer-events:none}
.ld-sp{width:42px;height:42px;border:2.5px solid rgba(55,183,130,.12);border-top-color:var(--main);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.ld p{color:var(--main);font-family:'Outfit',sans-serif;font-size:.75rem;margin-top:14px;position:absolute;top:56%;letter-spacing:2px}

.toast{
  position:fixed;bottom:28px;left:50%;z-index:300;
  transform:translateX(-50%) translateY(80px);
  background:rgba(255,70,70,.9);color:#fff;
  padding:10px 24px;border-radius:14px;font-size:.8rem;max-width:85vw;text-align:center;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.toast.on{transform:translateX(-50%) translateY(0)}

/* ═══ RESPONSIVE ═══ */
@media(max-aspect-ratio:4/5){
  .main{flex-direction:column;gap:clamp(10px,2vh,20px)}
  .side-l,.side-r{display:none}
  .wheel-area{--size:min(82vw,54vh,420px)}
  .port-hero{display:flex !important;flex-direction:column;align-items:center;gap:8px;margin-bottom:4px;padding:0 20px}
  .port-hero .kicker{
    display:inline-block;font-family:'Outfit',sans-serif;font-weight:600;
    font-size:clamp(.6rem,2.2vw,.78rem);letter-spacing:4px;
    color:var(--main-light);text-transform:uppercase;
    padding:5px 12px;border:1px solid rgba(55,183,130,.35);
    border-radius:999px;background:rgba(55,183,130,.08);
  }
  .port-hero h1{
    font-family:'Noto Sans KR','Outfit',sans-serif;font-weight:900;
    font-size:clamp(1.8rem,7.5vw,2.8rem);line-height:1.05;
    color:var(--text);text-align:center;
    text-shadow:0 2px 24px rgba(55,183,130,.3);
  }
  .port-hero h1 em{
    font-style:normal;
    background:linear-gradient(135deg,#a8ffd8,var(--main-light),var(--main),var(--sub-light));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 2px 14px rgba(55,183,130,.4));
  }
  .port-hero p{
    font-size:clamp(.72rem,2.2vw,.9rem);
    color:var(--text-dim);text-align:center;font-weight:400;letter-spacing:.2px;
  }
}
.port-hero{display:none}
@media(min-aspect-ratio:5/4){.wheel-area{--size:min(55vw,68vh,500px)}}
</style>
</head>
<body>

<div class="ld" id="ld"><div class="ld-sp"></div><p>Loading…</p></div>
<div class="bg"></div>
<canvas class="stars" id="stars"></canvas>

<header class="header">
  <div class="logo-bar">
    <img class="logo-main" id="logoMain" alt="SPH">
    <div class="logo-partners">
      <img id="logoSigma" alt="Sigma">
      <img id="logoSnow" alt="Snowflake">
    </div>
  </div>
</header>

<div class="port-hero">
  <span class="kicker">SPH LUCKY EVENT</span>
  <h1>행운의 <em>돌림판</em></h1>
  <p>버튼을 눌러 오늘의 행운을 만나보세요</p>
</div>

<main class="main">
  <div class="side-l">
    <div class="line"></div>
    <span class="kicker">LUCKY EVENT</span>
    <h1>행운의<br><em>돌림판</em></h1>
    <p>START 버튼을 터치하고<br>행운의 선물을 받아가세요</p>
  </div>

  <div class="wheel-area" id="ww">
    <div class="ring-deco"></div>
    <div class="wheel-glow"></div>
    <canvas class="leds" id="leds"></canvas>
    <canvas id="wheel"></canvas>
    <div class="ptr" id="ptr">
      <svg width="32" height="38" viewBox="0 0 32 38">
        <defs><linearGradient id="pg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#a8ffd8"/><stop offset="100%" stop-color="#2a8f65"/>
        </linearGradient></defs>
        <path d="M16 38L1 5a2 2 0 011.8-2.8h26.4A2 2 0 0131 5L16 38z" fill="url(#pg)"/>
        <path d="M16 30L5 7h22L16 30z" fill="#fff" opacity=".2"/>
      </svg>
    </div>
    <button class="cbtn" id="spin" type="button"><span class="rng"></span>START</button>
  </div>

  <div class="side-r">
    <div class="line"></div>
    <span class="kicker">HOW TO PLAY</span>
    <p class="tip">
      <strong>START</strong> 버튼을<br>
      가볍게 터치!<br>
      <span class="small">룰렛이 멈춘 자리의<br>선물을 받아가세요 🎁</span>
    </p>
  </div>
</main>

<footer class="footer">
  <p>© SPH&ensp;·&ensp;Story Place & Human</p>
</footer>

<div class="overlay" id="ov">
  <div class="modal">
    <div class="m-icon" id="mI">🎉</div>
    <div class="m-title">축하합니다!</div>
    <div class="m-prize" id="mP"></div>
    <button class="m-btn" id="mC" type="button">확인</button>
  </div>
</div>

<canvas id="confetti"></canvas>
<div class="toast" id="toast"></div>

// ━━━ OFFSCREEN WHEEL ━━━
let offCV=null,offS=0;
function buildWheel(){
  const rc=$w.getBoundingClientRect(),ww=rc.width,wh=rc.height;
  szCV($w,ww,wh);
  offS=Math.ceil(Math.max(ww,wh)*DPR);
  offCV=(typeof OffscreenCanvas!=='undefined')?new OffscreenCanvas(offS,offS):Object.assign(document.createElement('canvas'),{width:offS,height:offS});
  const c=offCV.getContext('2d'),cx=offS/2,cy=offS/2,R=offS/2-3*DPR;
  c.clearRect(0,0,offS,offS);

  // outer rim
  c.beginPath();c.arc(cx,cy,R+2*DPR,0,Math.PI*2);
  c.strokeStyle='rgba(55,183,130,.2)';c.lineWidth=1.5*DPR;c.stroke();

  for(let i=0;i<N;i++){
    const a0=i*ARC-Math.PI/2,a1=a0+ARC,sg=SEG[i];
    c.beginPath();c.moveTo(cx,cy);c.arc(cx,cy,R,a0,a1);c.closePath();
    const g=c.createRadialGradient(cx,cy,R*.08,cx,cy,R);
    g.addColorStop(0,ltn(sg.c1,35));g.addColorStop(.4,sg.c1);g.addColorStop(1,sg.c2);
    c.fillStyle=g;c.fill();

    // slice borders
    c.beginPath();c.moveTo(cx,cy);c.arc(cx,cy,R,a0,a1);c.closePath();
    c.strokeStyle='rgba(255,255,255,.12)';c.lineWidth=1*DPR;c.stroke();

    // shimmer highlight on top edge
    c.beginPath();c.arc(cx,cy,R-2*DPR,a0+.03,a1-.03);
    c.strokeStyle='rgba(255,255,255,.06)';c.lineWidth=3*DPR;c.stroke();

    c.save();c.translate(cx,cy);c.rotate(a0+ARC/2);
    // icon
    c.font=`${R*.145}px serif`;c.textAlign='center';c.textBaseline='middle';
    c.fillText(sg.icon,R*.72,0);
    // label (multi-line support)
    const lines=sg.lines||[sg.label];
    const fs=lines.length>1?R*.072:R*.082;
    const lh=fs*1.12;
    c.font=`900 ${fs}px 'Noto Sans KR',sans-serif`;
    c.fillStyle='#fff';
    c.shadowColor='rgba(0,0,0,.75)';c.shadowBlur=4*DPR;c.shadowOffsetY=1*DPR;
    for(let li=0;li<lines.length;li++){
      const yOff=(li-(lines.length-1)/2)*lh;
      c.fillText(lines[li],R*.40,yOff);
    }
    c.shadowBlur=0;c.shadowOffsetY=0;c.restore();
  }

  // hub
  const hR=R*.20;
  const hg=c.createRadialGradient(cx-hR*.2,cy-hR*.2,0,cx,cy,hR);
  hg.addColorStop(0,'#143828');hg.addColorStop(1,'#061a10');
  c.beginPath();c.arc(cx,cy,hR,0,Math.PI*2);c.fillStyle=hg;c.fill();
  c.strokeStyle='rgba(55,183,130,.45)';c.lineWidth=2*DPR;c.stroke();
}
function ltn(h,p){
  let r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return`rgb(${Math.min(255,r+p)},${Math.min(255,g+p)},${Math.min(255,b+p)})`;
}
let rot=0;
function renderW(){
  const c=$w.getContext('2d');c.setTransform(1,0,0,1,0,0);
  c.clearRect(0,0,$w.width,$w.height);
  c.save();c.translate($w.width/2,$w.height/2);c.rotate(rot);
  c.drawImage(offCV,-offS/2,-offS/2);c.restore();
}

// ━━━ LEDs ━━━
const LED_N=30;let ledPh=0;
function sizeLeds(){const rc=$l.parentElement.getBoundingClientRect();szCV($l,rc.width+20,rc.height+20)}
function drawLeds(){
  const c=$l.getContext('2d'),W=$l.width,H=$l.height,cx=W/2,cy=H/2,R=W/2-5*DPR;
  c.clearRect(0,0,W,H);
  for(let i=0;i<LED_N;i++){
    const a=(i/LED_N)*Math.PI*2-Math.PI/2,x=cx+Math.cos(a)*R,y=cy+Math.sin(a)*R;
    const on=((i+ledPh)%3<2);
    c.beginPath();c.arc(x,y,2.5*DPR,0,Math.PI*2);
    c.fillStyle=on?'rgba(55,183,130,.8)':'rgba(55,183,130,.1)';c.fill();
    if(on){c.beginPath();c.arc(x,y,5.5*DPR,0,Math.PI*2);c.fillStyle='rgba(55,183,130,.06)';c.fill();}
  }
}
setInterval(()=>{ledPh++;drawLeds()},200);

let starD=[];
function initStars(){
  const w=innerWidth,h=innerHeight;szCV($sr,w,h);
  starD=Array.from({length:50},()=>({x:Math.random()*w,y:Math.random()*h,r:.2+Math.random()*1,a:Math.random(),da:.004+Math.random()*.012,d:Math.random()>.5?1:-1}));
}
function drawStars(){
  const c=$sr.getContext('2d');c.clearRect(0,0,$sr.width,$sr.height);
  for(const s of starD){s.a+=s.da*s.d;if(s.a>1||s.a<.05)s.d*=-1;
    c.beginPath();c.arc(s.x*DPR,s.y*DPR,s.r*DPR,0,Math.PI*2);
    c.fillStyle=`rgba(200,240,220,${s.a*.3})`;c.fill();
  }requestAnimationFrame(drawStars);
}

// ━━━ AUDIO ━━━
let _ac;function ac(){if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();return _ac}
function playTick(){try{const c=ac(),t=c.currentTime,o=c.createOscillator(),g=c.createGain();
  o.connect(g);g.connect(c.destination);o.type='square';
  o.frequency.setValueAtTime(1300,t);o.frequency.exponentialRampToValueAtTime(500,t+.025);
  g.gain.setValueAtTime(.10,t);g.gain.exponentialRampToValueAtTime(.001,t+.04);
  o.start(t);o.stop(t+.04);}catch(_){}}
function playFanfare(){try{const c=ac(),t=c.currentTime;
  [{f:523,d:0},{f:659,d:.12},{f:784,d:.24},{f:1047,d:.38},{f:1319,d:.5}]
  .forEach(n=>{['triangle','sine'].forEach((tp,ti)=>{
    const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=tp;
    o.frequency.setValueAtTime(n.f*(ti?2:1),t+n.d);g.gain.setValueAtTime(ti?.05:.14,t+n.d);
    g.gain.exponentialRampToValueAtTime(.001,t+n.d+.5);o.start(t+n.d);o.stop(t+n.d+.5);
  });});}catch(_){}}

    vy:(2+Math.random()*3)*DPR,vx:(Math.random()-.5)*2*DPR,
    rot:Math.random()*360,rv:3+Math.random()*8,
    col:cols[Math.random()*cols.length|0],
    life:1,dec:.003+Math.random()*.004,rnd:Math.random()>.5
  }));confOn=true;
}
function drawConf(){if(!confOn)return;
  const c=$cf.getContext('2d');c.clearRect(0,0,$cf.width,$cf.height);let alive=0;
  for(const p of confP){if(p.life<=0)continue;alive++;
    p.y+=p.vy;p.x+=p.vx;p.rot+=p.rv;p.life-=p.dec;
    c.save();c.translate(p.x,p.y);c.rotate(p.rot*Math.PI/180);
    c.globalAlpha=Math.max(0,p.life);c.fillStyle=p.col;
    if(p.rnd){c.beginPath();c.arc(0,0,p.w/2,0,Math.PI*2);c.fill();}
    else c.fillRect(-p.w/2,-p.h/2,p.w,p.h);c.restore();
  }if(!alive){confOn=false;c.clearRect(0,0,$cf.width,$cf.height);}}

// ━━━ SPIN ━━━
let spinning=false,stock={};
function segFor(prize){const m=[];SEG.forEach((s,i)=>{if(cKey(s.id)===prize)m.push(i)});return m[Math.random()*m.length|0]}
$s.addEventListener('click',handleSpin);
$mC.addEventListener('click',()=>$ov.classList.remove('on'));

async function handleSpin(){
  if(spinning)return;spinning=true;$s.classList.add('off');
  try{const c=ac();if(c.state==='suspended')c.resume();}catch(_){}
  let speed=0;const mx=.38;let phase='accel',holdT=0,result=null,tgtA=null,lastTk=rot;
  const prom=serverSpin();
  function frame(){
    if(phase==='done')return;
    if(phase==='accel'){speed=Math.min(speed+.009,mx);if(speed>=mx)phase='hold';}
    else if(phase==='hold'){holdT++;if(result&&holdT>70){phase='decel';
      const idx=segFor(result.prize),mid=idx*ARC+ARC/2,base=-mid+Math.PI*2,spins=5*Math.PI*2,cur=rot%(Math.PI*2);
      tgtA=rot+spins+((base-cur)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);tgtA+=(Math.random()-.5)*ARC*.4;
    }}else if(phase==='decel'){const rem=tgtA-rot;
      if(rem<=.0005){rot=tgtA;renderW();phase='done';onDone(result);return;}
      speed=Math.max(.0015,rem*.035);
    }
    rot+=speed;
    if(Math.floor(rot/ARC)!==Math.floor(lastTk/ARC)){playTick();$p.classList.remove('tick');void $p.offsetWidth;$p.classList.add('tick');}
    lastTk=rot;renderW();drawConf();requestAnimationFrame(frame);
  }requestAnimationFrame(frame);
  try{result=await prom;if(result.error){phase='done';toast(result.error);spinning=false;$s.classList.remove('off');}}
  catch(_){phase='done';toast('서버 연결 오류! 다시 시도해주세요.');spinning=false;$s.classList.remove('off');}
}
function onDone(res){playFanfare();launchConfetti();
  setTimeout(()=>{const sg=SEG.find(s=>cKey(s.id)===res.prize)||SEG[0];
    $mI.textContent=sg.icon;$mP.textContent=sg.label+' 당첨!';$ov.classList.add('on');},300);
  if(res.stock)stock=res.stock;spinning=false;$s.classList.remove('off');
}

// ━━━ SERVER ━━━
async function serverSpin(){return(await fetch(GAS_URL+'?action=spin',{redirect:'follow'})).json()}
async function loadStock(){const d=await(await fetch(GAS_URL+'?action=stock',{redirect:'follow'})).json();stock=d.stock||{};}

// ━━━ TOAST ━━━
let tt;function toast(m){clearTimeout(tt);$t.textContent=m;$t.classList.add('on');tt=setTimeout(()=>$t.classList.remove('on'),3500)}

// ━━━ LOOP ━━━
!function loop(){drawConf();requestAnimationFrame(loop)}();

// ━━━ INIT ━━━
function init(){
  initStars();drawStars();buildWheel();sizeLeds();drawLeds();renderW();
  if(GAS_URL==='YOUR_GAS_WEB_APP_URL_HERE'){$ld.classList.add('hide');toast('⚠️ GAS_URL을 설정해주세요!');return;}
  loadStock().then(()=>$ld.classList.add('hide')).catch(()=>{$ld.classList.add('hide');toast('서버 연결 확인 필요');});
}
addEventListener('DOMContentLoaded',init);
addEventListener('resize',()=>{buildWheel();sizeLeds();drawLeds();renderW();initStars();});
</script>
</body>
